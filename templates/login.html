{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirish | StudentFolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
<style>
    body {
        font-family: 'Inter', sans-serif;
        /* Fon rasmi ustiga nozik qorong'u qatlam */
        background: url("{% static 'images/auth-bg.jpg' %}");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0;
    }

    .login-card {
        border-radius: 24px;
        width: 100%;
        max-width: 400px;
        padding: 2.5rem;

        /* ODATIY HOLAT: Deyarli to'liq shaffof */
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);

        transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
    }

    /* KURSOR BORGANDA: Karta oqroq bo'ladi */
    .login-card:hover {
        transform: translateY(-8px);
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
    }

    /* TEXTBOX (INPUTLAR) DIZAYNI */
    .form-control {
        padding: 12px 15px;
        border-radius: 12px;
        /* Shaffof inputlar */
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: white; /* Yozuv ko'rinishi uchun */
        transition: all 0.3s ease;
    }

    /* Placeholder matni */
    .form-control::placeholder {
        color: rgba(255, 255, 255, 0.6);
    }

    /* Textboxga bosilganda (Focus) */
    .form-control:focus {
        background: rgba(255, 255, 255, 0.2);
        border-color: rgba(255, 255, 255, 0.5);
        color: white;
        box-shadow: none;
    }

    /* Karta oq bo'lganda (hoverda) inputlar qora bo'lishi uchun */
    .login-card:hover .form-control {
        background: #f8f9fa;
        border-color: #dee2e6;
        color: #212529;
    }

    .login-card:hover .form-control::placeholder {
        color: #6c757d;
    }

    /* LABEL VA MATNLAR */
    .form-label {
        color: rgba(255, 255, 255, 0.9);
        font-size: 0.85rem;
        transition: color 0.4s;
    }

    .login-card:hover .form-label,
    .login-card:hover .text-muted {
        color: #495057 !important;
    }

    /* TUGMA VA LOGO */
    .btn-primary {
        padding: 12px;
        border-radius: 12px;
        font-weight: 700;
        background: #0d6efd;
        border: none;
        transition: 0.3s;
    }

    .btn-primary:hover {
        background: #0b5ed7;
        transform: scale(1.02);
    }

    .brand-logo {
        font-weight: 800;
        color: #0d6efd;
        text-decoration: none;
        font-size: 1.7rem;
    }

    .dot {
        height: 8px;
        width: 8px;
        background-color: #f3a847;
        border-radius: 50%;
        display: inline-block;
    }

    .input-group-text-btn {
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-left: none;
        color: white;
        border-top-right-radius: 12px !important;
        border-bottom-right-radius: 12px !important;
    }

    .login-card:hover .input-group-text-btn {
        background: #f8f9fa;
        border-color: #dee2e6;
        color: #6c757d;
    }
</style>
</head>
<body>

    <div class="login-card">
        <div class="text-center mb-4">
            <a href="/" class="brand-logo mb-1 d-block">StudentFolio</a>
            <div class="dot"></div>
            <h4 class="fw-bold">Xush kelibsiz!</h4>
            <p class="text-muted small">Tizimga kirish uchun ma'lumotlaringizni kiriting.</p>
        </div>

        <form method="POST">
            {% csrf_token %}

            {% if error %}
            <div class="alert alert-danger py-2 border-0 mb-3 small fw-bold text-center rounded-3">
                {{ error }}
            </div>
            {% endif %}

            <div class="mb-3">
                <label for="username" class="form-label small fw-semibold">Identifikator (Login)</label>
                <input type="text" name="username" class="form-control" id="username" placeholder="Foydalanuvchi nomi" required>
            </div>

            <div class="mb-2">
                <label for="password" class="form-label small fw-semibold">Maxfiy kalit</label>
                <div class="input-group">
                    <input type="password" name="password" class="form-control" id="password" placeholder="••••••••" required>
                    <button class="btn btn-outline-secondary input-group-text-btn" type="button" onclick="togglePassword('password', this)">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>

            <div class="text-end mb-4">
                <a href="#" class="text-decoration-none small text-primary fw-medium">Kalitni unutdingizmi?</a>
            </div>

            <div class="d-grid mb-3">
                <button type="submit" class="btn btn-primary shadow-sm">
                    Tizimga kirish <i class="bi bi-box-arrow-in-right ms-1"></i>
                </button>
            </div>
        </form>

        <div class="text-center mt-4">
            <p class="small text-muted mb-0">Hali hisobingiz yo'qmi?
                <a href="/register" class="text-primary fw-bold text-decoration-none">Ro'yxatdan o'ting</a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    function togglePassword(inputId, button) {
        const input = document.getElementById(inputId);
        const icon = button.querySelector('i');

        if (input.type === "password") {
            input.type = "text";
            icon.classList.replace('bi-eye', 'bi-eye-slash');
        } else {
            input.type = "password";
            icon.classList.replace('bi-eye-slash', 'bi-eye');
        }
    }
    </script>
</body>
</html>

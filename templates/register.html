<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ro'yxatdan o'tish | StudentFolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }
        .register-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 420px;
            background: #ffffff;
            padding: 2.5rem;
        }
        .form-control {
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid #dee2e6;
            font-size: 0.95rem;
        }
        .form-control:focus {
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.1);
            border-color: #0d6efd;
        }
        .btn-primary {
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            background-color: #0d6efd;
            border: none;
        }
        .brand-logo {
            font-weight: 700;
            color: #0d6efd;
            text-decoration: none;
            font-size: 1.5rem;
        }
        .dot {
            height: 8px;
            width: 8px;
            background-color: #f3a847;
            border-radius: 50%;
            display: inline-block;
            margin-bottom: 5px;
        }
        .input-group-text-btn {
            background: transparent;
            border-left: none;
            cursor: pointer;
            color: #6c757d;
        }
        .input-group .form-control {
            border-right: none;
        }
    </style>
</head>
<body>

    <div class="register-card">
        <div class="text-center mb-4">
            <a href="/" class="brand-logo mb-1 d-block">StudentFolio</a>
            <div class="dot"></div>
            <h4 class="fw-bold">Safimizga qo'shiling</h4>
            <p class="text-muted small">Kelajakdagi karyerangizni bugun biz bilan quring.</p>
        </div>

        <form method="POST">
            {% csrf_token %}

            {% if error %}
            <div class="alert alert-danger py-2 border-0 mb-3 small fw-bold text-center rounded-3">
                {{ error }}
            </div>
            {% endif %}

            <div class="mb-3">
                <label for="username" class="form-label small fw-semibold">Identifikator (Login)</label>
                <input type="text" name="username" class="form-control" id="username" placeholder="Masalan: avazbek_dev" required>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label small fw-semibold">Email manzil</label>
                <input type="email" name="email" class="form-control" id="email" placeholder="misol@tuit.uz" required>
                <div class="form-text" style="font-size: 0.7rem;">Parolni tiklash uchun kerak bo'ladi.</div>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label small fw-semibold">Maxfiy kalit</label>
                <div class="input-group">
                    <input type="password" name="password" class="form-control" id="password" placeholder="••••••••" required>
                    <button class="btn btn-outline-secondary input-group-text-btn" type="button" onclick="togglePassword('password', this)">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>

            <div class="mb-4">
                <label for="password_confirm" class="form-label small fw-semibold">Kalitni tasdiqlash</label>
                <div class="input-group">
                    <input type="password" name="password_confirm" class="form-control" id="password_confirm" placeholder="••••••••" required>
                    <button class="btn btn-outline-secondary input-group-text-btn" type="button" onclick="togglePassword('password_confirm', this)">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>

            <div class="d-grid mb-3">
                <button type="submit" class="btn btn-primary shadow-sm fw-bold">
                    Olamni zabt etish <i class="bi bi-rocket-takeoff ms-1"></i>
                </button>
            </div>
        </form>

        <div class="text-center mt-3">
            <p class="small text-muted mb-0">Hisobingiz bormi?
                <a href="/login" class="text-primary fw-bold text-decoration-none">Kirish</a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    function togglePassword(inputId, button) {
        const input = document.getElementById(inputId);
        const icon = button.querySelector('i');
        if (input.type === "password") {
            input.type = "text";
            icon.classList.replace('bi-eye', 'bi-eye-slash');
        } else {
            input.type = "password";
            icon.classList.replace('bi-eye-slash', 'bi-eye');
        }
    }
    </script>
</body>
</html>

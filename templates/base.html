<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}StudentFolio | Dashboard{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root { --sidebar-width: 280px; --primary: #0d6efd; --bg-soft: #f8faff; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-soft); overflow-x: hidden; }

        /* Sidebar */
        .sidebar { width: var(--sidebar-width); height: 100vh; position: fixed; background: #fff; border-right: 1px solid #edf2f9; z-index: 1000; transition: 0.3s; }
        .sidebar-brand { padding: 2rem 1.5rem; font-weight: 800; color: var(--primary); font-size: 1.5rem; text-decoration: none; display: block; }

        .nav-link { padding: 0.8rem 1.5rem; color: #6e84a3; font-weight: 500; border-radius: 12px; margin: 0.2rem 1rem; transition: 0.2s; }
        .nav-link:hover { color: var(--primary); background: rgba(13, 110, 253, 0.05); }
        .nav-link.active { color: #fff; background: var(--primary); box-shadow: 0 4px 15px rgba(13, 110, 253, 0.25); }
        .nav-link i { font-size: 1.2rem; margin-right: 10px; }

        /* Main Area */
        .main-wrapper { margin-left: var(--sidebar-width); min-height: 100vh; padding: 2rem; }
        .top-navbar { background: transparent; padding: 0 1rem 2rem 1rem; }

        /* Modern Cards */
        .stat-card { border: none; border-radius: 20px; padding: 1.5rem; background: #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.02); transition: 0.3s; }
        .stat-card:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(0,0,0,0.05); }
        .icon-box { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin-bottom: 1rem; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <a href="/" class="sidebar-brand">StudentFolio<span style="color: #f3a847;">.</span></a>
        <nav class="nav flex-column">
    <a href="{% url 'dashboard' %}" class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
        <i class="bi bi-grid-1x2-fill"></i> Asosiy
    </a>
    <a href="{% url 'projects' %}" class="nav-link {% if request.resolver_match.url_name == 'projects' %}active{% endif %}">
        <i class="bi bi-folder2-open"></i> Loyihalarim
    </a>
    <a href="{% url 'certificates' %}" class="nav-link {% if request.resolver_match.url_name == 'certificates' %}active{% endif %}">
        <i class="bi bi-patch-check"></i> Sertifikatlar
    </a>
    <a href="{% url 'achievements' %}" class="nav-link {% if request.resolver_match.url_name == 'achievements' %}active{% endif %}">
        <i class="bi bi-trophy"></i> Yutuqlar
    </a>
  <a href="{% url 'experiences' %}" class="nav-link {% if request.resolver_match.url_name == 'experiences' %}active{% endif %}">
    <i class="bi bi-briefcase"></i> Ish faoliyati
</a>
    <div class="mt-4 px-4 small text-uppercase fw-bold text-muted" style="font-size: 0.7rem; letter-spacing: 1px;">Sozlamalar</div>

    <a href="{% url 'profil_form' %}" class="nav-link {% if request.resolver_match.url_name == 'profil_form' %}active{% endif %}">
        <i class="bi bi-person-gear"></i> Profil tahriri
    </a>
    <a href="{% url 'logout' %}" class="nav-link text-danger">
        <i class="bi bi-box-arrow-right"></i> Chiqish
    </a>
</nav>
    </aside>

    <main class="main-wrapper">
        <div class="top-navbar d-flex justify-content-between align-items-center">
            <div>
                <h4 class="fw-800 mb-0">Xush kelibsiz, {{ profil.ism }}! </h4>
                <p class="text-muted small mb-0">Bugun: {% now "d-F, Y" %}</p>
            </div>
            <div class="d-flex align-items-center gap-3">
                <div class="text-end d-none d-md-block">
                    <p class="mb-0 fw-bold">{{ profil.ism }} {{ profil.familiya }}</p>
                    <p class="text-muted small mb-0">{{ profil.university }}</p>
                </div>
                <img src="{{ profil.avatar.url }}" class="rounded-circle border p-1" width="45" height="45" style="object-fit: cover;">
            </div>
        </div>

        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
